name: Metals Trading Bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_BASE_URL: ${{ secrets.CAPITAL_BASE_URL }}
          CAPITAL_BASE_DEMO_URL: ${{ secrets.CAPITAL_BASE_DEMO_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          IS_DEMO: ${{ secrets.IS_DEMO }}
          GITHUB_USERNAME: kshitij406
          GITHUB_REPO: capital.com-metal-trading-bot

      - name: Persist trades.db and stats.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f trades.db stats.json
          git diff --cached --quiet || git commit -m "Update trades.db and stats.json [skip ci]"
          git pull --rebase origin main && git push origin main || \
            (git pull --rebase origin main && git push origin main)
